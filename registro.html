<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CODIFY</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <div class="auth-container">
        <h1>Cadastro</h1>
        <form id="registerForm">
            <label for="name">Nome</label>
            <input type="text" id="name" name="name" placeholder="Seu Nome" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required>

            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="********" required>

            <button type="submit">Registrar</button>
        </form>
        <p>Já tem conta? <a href="login.html">Faça Login</a></p>
        <div id="errorMessage" style="color: red; display: none;"></div>
    </div>
    <script src="api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const data = await api.register(name, email, password);

                if (data.success) {
                    api.setToken(data.data.token, data.data.user);
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('errorMessage').textContent = data.error.message;
                    document.getElementById('errorMessage').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('errorMessage').textContent = 'Erro de conexão';
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
    </script>
</body>

</html>
